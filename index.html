<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário de Software - IFRS Canoas</title>
    
    <link rel="icon" type="image/png" href="ifrs.png">
    <link rel="apple-touch-icon" href="ifrs.png">

    <style>
        :root { --ifrs-verde: #32a041; --ifrs-verde-escuro: #257a31; --ifrs-cinza: #f4f4f4; --ifrs-texto: #333333; --ifrs-amarelo: #ffc107; --cor-borda: #ccc; }
        
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #e9ecef; margin: 0; padding: 20px; color: var(--ifrs-texto); user-select: none; }
        
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 8px solid var(--ifrs-verde); position: relative; }
        
        /* Botões de Topo */
        .top-buttons { position: absolute; top: 30px; right: 30px; display: flex; gap: 10px; z-index: 100; }
        .btn-request { background-color: var(--ifrs-amarelo); color: #212529; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.9em; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-request:hover { background-color: #e0a800; transform: translateY(-2px); }
        .btn-admin-toggle { background: #fff; border: 1px solid #ccc; color: #666; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 0.85em; transition: 0.2s; font-weight: bold; }
        
        /* Cabeçalho */
        .header-main { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; border-bottom: 2px solid var(--ifrs-cinza); padding-bottom: 20px; }
        .logo-ifrs { width: 125px; height: auto; } 
        .header-titles h1 { color: var(--ifrs-verde-escuro); margin: 0; font-size: 2.2em; }
        .header-titles p.subtitle { color: #666; margin: 5px 0 0 0; font-weight: bold; font-size: 1.25em; }

        /* Controles */
        .header-controls, .add-form { background: var(--ifrs-cinza); padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .header-controls { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .add-form { border-left: 5px solid var(--ifrs-verde); display: none; flex-direction: column; gap: 15px; }
        
        /* Tabela Responsiva */
        .table-container { width: 100%; overflow-x: auto; margin-top: 10px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 750px; }
        th { background-color: var(--ifrs-verde); color: white; padding: 15px; text-align: left; text-transform: uppercase; font-size: 0.85em; position: sticky; top: 0; z-index: 5; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; background: white; }
        tr:nth-child(even) td { background-color: #f9f9f9; }
        
        .lab-badge { background: #d4edda; color: #155724; padding: 4px 10px; border-radius: 4px; font-size: 0.8em; font-weight: bold; margin-right: 5px; border: 1px solid #c3e6cb; display: inline-block; margin-bottom: 4px; }
        
        /* MODAL DE SOLICITAÇÃO E ALINHAMENTO DAS LICENÇAS */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 2000; padding: 15px; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 100%; max-width: 550px; position: relative; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .modal-content h2 { color: var(--ifrs-verde-escuro); margin: 0 0 15px 0; font-size: 1.5em; border-bottom: 2px solid var(--ifrs-cinza); padding-bottom: 10px; }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label.main-label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.95em; color: #444; }
        .form-group input[type="text"], .form-group input[type="email"], .form-group input[type="url"] { width: 100%; padding: 12px; border: 1px solid var(--cor-borda); border-radius: 8px; font-size: 14px; transition: 0.2s; }
        .form-group input:focus { border-color: var(--ifrs-verde); outline: none; box-shadow: 0 0 0 3px rgba(50,160,65,0.15); }
        
        .license-options-container { background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #eee; display: flex; flex-direction: column; gap: 10px; }
        .license-item { display: flex; align-items: center; gap: 10px; position: relative; cursor: pointer; padding: 5px 0; }
        
        .license-item input[type="radio"] { appearance: none; -webkit-appearance: none; width: 18px; height: 18px; border: 2px solid #aaa; border-radius: 50%; background-color: #fff; cursor: pointer; display: grid; place-content: center; transition: 0.15s; margin: 0; flex-shrink: 0; }
        .license-item input[type="radio"]::before { content: ""; width: 10px; height: 10px; border-radius: 50%; transform: scale(0); transition: 0.15s; box-shadow: inset 10px 10px var(--ifrs-verde); }
        .license-item input[type="radio"]:checked { border-color: var(--ifrs-verde); }
        .license-item input[type="radio"]:checked::before { transform: scale(1); }
        
        .license-text { font-size: 0.9em; color: var(--ifrs-texto); flex-grow: 1; }
        .info-icon { background: #6c757d; color: white; width: 18px; height: 18px; border-radius: 50%; font-size: 11px; display: inline-flex; align-items: center; justify-content: center; cursor: help; font-weight: bold; flex-shrink: 0; }
        
        .license-item:hover .tooltip-text { visibility: visible; opacity: 1; }
        .tooltip-text { visibility: hidden; width: 280px; background-color: #333; color: #fff; text-align: left; border-radius: 8px; padding: 12px; position: absolute; z-index: 100; bottom: 130%; left: 30px; opacity: 0; transition: opacity 0.3s; font-size: 12px; line-height: 1.4; pointer-events: none; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .tooltip-text::after { content: ""; position: absolute; top: 100%; left: 20px; margin-left: -5px; border-width: 5px; border-style: solid; border-color: #333 transparent transparent transparent; }

        .btn-close-modal { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 24px; cursor: pointer; color: #999; }
        .btn-salvar { background-color: var(--ifrs-verde); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn-salvar:hover { background-color: var(--ifrs-verde-escuro); transform: translateY(-1px); }
        
        @media (max-width: 768px) {
            .top-buttons { position: static; flex-direction: column; width: 100%; margin-bottom: 20px; }
            .header-main { flex-direction: column; text-align: center; }
            .logo-ifrs { width: 100px; }
            .header-titles h1 { font-size: 1.5em; }
            .header-titles p.subtitle { font-size: 1em; }
            .tooltip-text { width: 240px; left: 10px; }
        }

        .loading { text-align: center; padding: 40px; color: #777; font-weight: bold; }
    </style>
</head>
<body>

<div id="requestModal" class="modal-overlay">
    <div class="modal-content">
        <button class="btn-close-modal" onclick="closeRequestModal()">×</button>
        <h2>📝 Solicitar Novo Software</h2>
        <form id="softwareRequestForm" onsubmit="submitRequest(event)">
            <div class="form-group">
                <label class="main-label">Nome do Software *</label>
                <input type="text" id="reqName" required placeholder="Ex: QGIS, Android Studio, Microsoft Office...">
            </div>

            <div class="form-group">
                <label class="main-label">Tipo de Licença *</label>
                <div class="license-options-container">
                    <label class="license-item">
                        <input type="radio" name="license" value="Software Proprietário" required>
                        <span class="license-text">Software Proprietário</span>
                        <span class="info-icon">?</span>
                        <span class="tooltip-text"><b>Software Proprietário:</b> O código-fonte é fechado e a cópia, modificação ou redistribuição são proibidas. O usuário adquire apenas o direito de uso.</span>
                    </label>
                    <label class="license-item">
                        <input type="radio" name="license" value="Open Source / Software Livre">
                        <span class="license-text">Open Source / Software Livre</span>
                        <span class="info-icon">?</span>
                        <span class="tooltip-text"><b>Open Source / Software Livre:</b> Concede liberdade para executar, estudar, modificar e redistribuir o software. Exemplos incluem GNU GPL, MIT e Apache.</span>
                    </label>
                    <label class="license-item">
                        <input type="radio" name="license" value="Freeware">
                        <span class="license-text">Freeware</span>
                        <span class="info-icon">?</span>
                        <span class="tooltip-text"><b>Freeware:</b> Software gratuito, mas não necessariamente "livre". O desenvolvedor mantém os direitos autorais e pode proibir modificações.</span>
                    </label>
                    <label class="license-item">
                        <input type="radio" name="license" value="Shareware">
                        <span class="license-text">Shareware</span>
                        <span class="info-icon">?</span>
                        <span class="tooltip-text"><b>Shareware:</b> Software disponibilizado gratuitamente por tempo ou funcionalidade limitada. Após o período de teste, o pagamento é solicitado.</span>
                    </label>
                    <label class="license-item">
                        <input type="radio" name="license" value="SaaS (Software as a Service)">
                        <span class="license-text">SaaS (Software as a Service)</span>
                        <span class="info-icon">?</span>
                        <span class="tooltip-text"><b>SaaS (Software as a Service):</b> Modelo baseado em nuvem, onde o software é acessado via internet com pagamento recorrente (assinatura), comum em plataformas SaaS.</span>
                    </label>
                    <label class="license-item">
                        <input type="radio" name="license" value="Adware">
                        <span class="license-text">Adware</span>
                        <span class="info-icon">?</span>
                        <span class="tooltip-text"><b>Adware:</b> Software gratuito que exibe publicidade, muitas vezes removida com a compra da licença.</span>
                    </label>
                    <label class="license-item">
                        <input type="radio" name="license" value="Licença Perpétua">
                        <span class="license-text">Licença Perpétua</span>
                        <span class="info-icon">?</span>
                        <span class="tooltip-text"><b>Licença Perpétua:</b> Compra-se o direito de usar uma versão específica do software para sempre, sem precisar renovar, mas sem atualizações futuras incluídas.</span>
                    </label>
                    <label class="license-item">
                        <input type="radio" name="license" value="EULA (End User License Agreement)">
                        <span class="license-text">EULA (End User License Agreement)</span>
                        <span class="info-icon">?</span>
                        <span class="tooltip-text"><b>EULA (End User License Agreement):</b> Contrato de Licença de Usuário Final, comum em todos os softwares, definindo as regras de uso.</span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label class="main-label">Link para Download / Site Oficial</label>
                <input type="url" id="reqLink" placeholder="https://www.software.com/download">
            </div>

            <div class="form-group">
                <label class="main-label">Nome do Solicitante *</label>
                <input type="text" id="reqUser" required placeholder="Seu nome completo">
            </div>

            <div class="form-group">
                <label class="main-label">E-mail Institucional *</label>
                <input type="email" id="reqEmail" required placeholder="exemplo@canoas.ifrs.edu.br">
            </div>

            <button type="submit" class="btn-salvar">Enviar para Análise da TI</button>
        </form>
    </div>
</div>

<div id="passwordModal" class="modal-overlay">
    <div class="modal-content" style="max-width: 350px;">
        <h3>🔒 Acesso Restrito</h3>
        <input type="password" id="adminPasswordInput" style="width:100%; padding:12px; margin:15px 0; border:1px solid #ccc; border-radius:6px;" placeholder="Senha...">
        <div style="display:flex; gap:10px;">
            <button class="btn-admin-toggle" style="flex:1" onclick="closePasswordModal()">Cancelar</button>
            <button class="btn-salvar" style="flex:1; margin:0;" onclick="confirmPassword()">Entrar</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="top-buttons">
        <button class="btn-request" onclick="openRequestModal()">➕ Solicitar Software</button>
        <button id="btnToggleAdmin" class="btn-admin-toggle" onclick="toggleAdmin()">🔒 Acesso Restrito</button>
    </div>
    
    <div class="header-main">
        <img src="ifrs.png" alt="Logo IFRS" class="logo-ifrs">
        <div class="header-titles">
            <h1>Campus Canoas</h1>
            <p class="subtitle">Mapeamento de Softwares por Laboratório</p>
        </div>
    </div>

    <div id="adminPanel" class="add-form">
        <h3 id="formTitle">➕ Gerenciar Inventário</h3>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <input type="number" id="newId" placeholder="ID" style="width:80px; padding:10px; border:1px solid #ccc; border-radius:6px;">
            <input type="text" id="newName" placeholder="Nome do Software" style="flex:1; padding:10px; border:1px solid #ccc; border-radius:6px;">
        </div>
        <div id="labSelectors" style="margin:10px 0; display:flex; flex-wrap:wrap; gap:8px;"></div>
        <div style="display:flex; gap:10px;">
            <button id="btnSave" class="btn-salvar" style="flex:1; margin:0;" onclick="saveSoftware('add')">Salvar no Banco</button>
            <button id="btnCancel" class="btn-admin-toggle" style="display:none" onclick="resetForm()">Cancelar</button>
        </div>
    </div>

    <div class="header-controls">
        <input type="text" id="searchInput" style="flex:1; padding:12px; border-radius:6px; border:1px solid #ccc;" placeholder="🔍 Buscar software ou laboratório (ex: E06)..." onkeyup="filterTable()">
        <div class="counter" id="resultCount" style="margin-left:15px; font-weight:bold; color:var(--ifrs-verde-escuro);">Carregando...</div>
    </div>

    <div id="loadingIndicator" class="loading">⏳ Sincronizando com a Planilha Google...</div>

    <div class="table-container">
        <table id="softwareTable" style="display:none;">
            <thead>
                <tr>
                    <th class="admin-col" style="display:none">Ações</th>
                    <th style="width: 70px;">ID</th>
                    <th>Software e Observações</th>
                    <th>Laboratórios</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // === A URL FORNECIDA NA SUA ÚLTIMA MENSAGEM FOI INSERIDA AQUI ===
    const GOOGLE_APP_URL = "https://script.google.com/macros/s/AKfycbzeFJrAYn4tnnU0E6F6aSnixorgiPStTc06qunS8Lx32V1zR931nfDjbB2YDUWZ1AAWrA/exec"; 
    
    const LABS_PERMITIDOS = ["E10", "E09", "E08", "E07", "E06", "E05", "E04", "D04", "D05", "D06", "D10", "B2", "B2A"];
    
    let softwareData = [];
    let isAdminMode = false;
    let senhaConfirmada = ""; 
    let labsSelecionados = [];

    // --- MODAL DE SOLICITAÇÃO ---
    function openRequestModal() { document.getElementById('requestModal').style.display = 'flex'; }
    function closeRequestModal() { document.getElementById('requestModal').style.display = 'none'; }

    async function submitRequest(event) {
        event.preventDefault();
        const email = document.getElementById('reqEmail').value;
        
        if (!email.endsWith("@canoas.ifrs.edu.br")) {
            alert("⚠️ Por favor, utilize seu e-mail institucional @canoas.ifrs.edu.br");
            return;
        }

        const btn = event.target.querySelector('button[type="submit"]');
        btn.disabled = true; btn.innerText = "⏳ Enviando...";

        const dados = {
            action: "solicitar",
            nomeSoftware: document.getElementById('reqName').value,
            licenca: document.querySelector('input[name="license"]:checked').value,
            link: document.getElementById('reqLink').value,
            solicitante: document.getElementById('reqUser').value,
            email: email
        };

        try {
            await fetch(GOOGLE_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(dados)
            });
            alert("✅ Solicitação enviada com sucesso! Ela será analisada pela equipe de TI.");
            closeRequestModal();
            document.getElementById('softwareRequestForm').reset();
        } catch (e) {
            alert("❌ Erro ao enviar. Verifique sua conexão com a internet.");
        } finally {
            btn.disabled = false; btn.innerText = "Enviar para Análise da TI";
        }
    }

    // --- SISTEMA ADMIN ---
    function toggleAdmin() {
        if (isAdminMode) {
            isAdminMode = false; senhaConfirmada = "";
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('btnToggleAdmin').innerHTML = '🔒 Acesso Restrito';
            renderTable();
        } else {
            document.getElementById('adminPasswordInput').value = "";
            document.getElementById('passwordModal').style.display = 'flex';
        }
    }

    function closePasswordModal() { document.getElementById('passwordModal').style.display = 'none'; }

    async function confirmPassword() {
        const senha = document.getElementById('adminPasswordInput').value;
        if(!senha) return;
        
        try {
            const res = await fetch(`${GOOGLE_APP_URL}?action=verificarSenha&senha=${encodeURIComponent(senha)}`);
            const dados = await res.json();
            if (dados.sucesso) {
                isAdminMode = true; senhaConfirmada = senha;
                document.getElementById('adminPanel').style.display = 'flex';
                document.getElementById('btnToggleAdmin').innerHTML = '🔓 Sair do Admin';
                closePasswordModal();
                renderTable();
            } else { alert("❌ Senha incorreta!"); }
        } catch(e) { alert("Erro ao validar senha."); }
    }

    async function loadData() {
        try {
            const res = await fetch(GOOGLE_APP_URL);
            softwareData = await res.json();
            document.getElementById('loadingIndicator').style.display = 'none';
            document.getElementById('softwareTable').style.display = 'table';
            renderTable();
        } catch (e) { document.getElementById('loadingIndicator').innerText = "Erro ao carregar dados. Verifique as permissões do Google Apps Script."; }
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        softwareData.sort((a,b) => a.id - b.id).forEach(sw => {
            const row = document.createElement('tr');
            const labsHTML = sw.labs.map(l => `<span class="lab-badge">${l || 'A DEFINIR'}</span>`).join('');
            
            row.innerHTML = `
                <td class="admin-col" style="display:${isAdminMode ? 'table-cell' : 'none'}">
                    <button style="cursor:pointer; background:#ffc107; border:none; padding:5px 10px; border-radius:4px;" onclick="prepararEdicao(${sw.id})">✏️</button>
                    <button style="cursor:pointer; background:#dc3545; color:white; border:none; padding:5px 10px; border-radius:4px;" onclick="apagarSoftware(${sw.id})">🗑️</button>
                </td>
                <td><strong>${sw.id}</strong></td>
                <td>${sw.name}</td>
                <td>${labsHTML}</td>
            `;
            tbody.appendChild(row);
        });
        filterTable();
    }

    function filterTable() {
        const busca = document.getElementById('searchInput').value.toUpperCase();
        const linhas = document.querySelectorAll('#tableBody tr');
        let cont = 0;
        linhas.forEach(r => {
            const txt = r.textContent.toUpperCase();
            const show = txt.indexOf(busca) > -1;
            r.style.display = show ? '' : 'none';
            if(show) cont++;
        });
        document.getElementById('resultCount').innerText = `${cont} Software(s)`;
    }

    function criarBotoesLaboratorio() {
        const container = document.getElementById('labSelectors');
        container.innerHTML = ''; 
        LABS_PERMITIDOS.forEach(lab => {
            const btn = document.createElement('div');
            btn.className = 'lab-badge';
            btn.style.cursor = 'pointer';
            btn.innerText = lab;
            btn.onclick = () => {
                if(labsSelecionados.includes(lab)) {
                    labsSelecionados = labsSelecionados.filter(l => l !== lab);
                    btn.style.background = '#d4edda'; btn.style.color = '#155724';
                } else {
                    labsSelecionados.push(lab);
                    btn.style.background = '#32a041'; btn.style.color = '#fff';
                }
            };
            container.appendChild(btn);
        });
    }

    async function saveSoftware(action) {
        const id = document.getElementById('newId').value;
        const name = document.getElementById('newName').value;
        const labs = labsSelecionados.join(", ") || "A DEFINIR";
        if(!id || !name) return alert("Preencha ID e Nome!");

        try {
            await fetch(GOOGLE_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action, id, name, labs, senha: senhaConfirmada })
            });
            alert("Operação concluída!"); location.reload();
        } catch(e) { alert("Erro ao salvar."); }
    }

    async function apagarSoftware(id) {
        if(!confirm("Deseja apagar este software do inventário?")) return;
        try {
            await fetch(GOOGLE_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action:'delete', id, senha: senhaConfirmada })
            });
            location.reload();
        } catch(e) { alert("Erro ao apagar."); }
    }

    function prepararEdicao(id) {
        const sw = softwareData.find(s => s.id == id);
        document.getElementById('newId').value = sw.id;
        document.getElementById('newId').readOnly = true;
        document.getElementById('newName').value = sw.name;
        document.getElementById('btnSave').onclick = () => saveSoftware('update');
        document.getElementById('btnCancel').style.display = 'block';
        window.scrollTo(0,0);
    }

    function resetForm() { location.reload(); }

    window.onload = () => { loadData(); criarBotoesLaboratorio(); };
</script>

</body>
</html>
