<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário de Software - IFRS Canoas</title>
    
    <link rel="icon" type="image/png" href="ifrs.png">
    <link rel="apple-touch-icon" href="ifrs.png">

    <style>
        :root { --ifrs-verde: #32a041; --ifrs-verde-escuro: #257a31; --ifrs-cinza: #f4f4f4; --ifrs-texto: #333333; --cor-borda: #ccc; }
        
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #e9ecef; margin: 0; padding: 20px; color: var(--ifrs-texto); user-select: none; }
        
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 8px solid var(--ifrs-verde); position: relative; }
        
        .top-buttons { position: absolute; top: 30px; right: 30px; display: flex; gap: 10px; z-index: 100; }
        .btn-admin-toggle { background: #fff; border: 1px solid #ccc; color: #666; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 0.85em; transition: 0.2s; font-weight: bold; }
        .btn-admin-toggle:hover { background: #f0f0f0; }
        
        .header-main { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; border-bottom: 2px solid var(--ifrs-cinza); padding-bottom: 20px; }
        .logo-ifrs { width: 125px; height: auto; } 
        .header-titles h1 { color: var(--ifrs-verde-escuro); margin: 0; font-size: 2.2em; }
        .header-titles p.subtitle { color: #666; margin: 5px 0 0 0; font-weight: bold; font-size: 1.25em; }

        .header-controls, .add-form { background: var(--ifrs-cinza); padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .header-controls { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .add-form { border-left: 5px solid var(--ifrs-verde); display: none; flex-direction: column; gap: 15px; }
        
        .table-container { width: 100%; overflow-x: auto; margin-top: 10px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 750px; }
        th { background-color: var(--ifrs-verde); color: white; padding: 15px; text-align: left; text-transform: uppercase; font-size: 0.85em; position: sticky; top: 0; z-index: 5; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; background: white; }
        tr:nth-child(even) td { background-color: #f9f9f9; }
        
        .lab-badge { background: #d4edda; color: #155724; padding: 4px 10px; border-radius: 4px; font-size: 0.8em; font-weight: bold; margin-right: 5px; border: 1px solid #c3e6cb; display: inline-block; margin-bottom: 4px; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 2000; padding: 15px; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 100%; max-width: 400px; position: relative; }
        .modal-content h3 { margin-top: 0; color: var(--ifrs-verde-escuro); }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid var(--cor-borda); border-radius: 8px; font-size: 14px; transition: 0.2s; }
        .form-group input:focus { border-color: var(--ifrs-verde); outline: none; }
        
        .btn-salvar { background-color: var(--ifrs-verde); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; width: 100%; font-size: 15px; }
        .btn-salvar:hover { background-color: var(--ifrs-verde-escuro); }
        
        @media (max-width: 768px) {
            .top-buttons { position: static; flex-direction: column; width: 100%; margin-bottom: 20px; }
            .header-main { flex-direction: column; text-align: center; }
            .logo-ifrs { width: 100px; }
        }

        .loading { text-align: center; padding: 40px; color: #777; font-weight: bold; line-height: 1.5; }
        .error-box { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; padding: 15px; border-radius: 8px; text-align: left; margin: 20px 0; font-size: 14px; }
    </style>
</head>
<body>

<div id="passwordModal" class="modal-overlay">
    <div class="modal-content">
        <h3>🔒 Acesso Restrito</h3>
        <p style="font-size: 13px; color: #666; margin-bottom: 15px;">Insira a senha cadastrada na aba "Config" da planilha.</p>
        <div class="form-group">
            <input type="password" id="adminPasswordInput" placeholder="Sua senha..." onkeypress="if(event.key === 'Enter') confirmPassword()">
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn-admin-toggle" style="flex:1" onclick="closePasswordModal()">Cancelar</button>
            <button class="btn-salvar" style="flex:1; margin:0;" onclick="confirmPassword()">Entrar</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="top-buttons">
        <button id="btnToggleAdmin" class="btn-admin-toggle" onclick="toggleAdmin()">🔒 Acesso Restrito</button>
    </div>
    
    <div class="header-main">
        <img src="ifrs.png" alt="Logo IFRS" class="logo-ifrs">
        <div class="header-titles">
            <h1>Campus Canoas</h1>
            <p class="subtitle">Mapeamento de Softwares por Laboratório</p>
        </div>
    </div>

    <div id="adminPanel" class="add-form">
        <h3 id="formTitle" style="margin-top:0;">➕ Gerenciar Inventário</h3>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <div class="form-group" style="width:100px; margin:0;">
                <input type="number" id="newId" placeholder="ID">
            </div>
            <div class="form-group" style="flex:1; margin:0;">
                <input type="text" id="newName" placeholder="Nome do Software">
            </div>
        </div>
        <div id="labSelectors" style="margin:10px 0; display:flex; flex-wrap:wrap; gap:8px;"></div>
        <div style="display:flex; gap:10px;">
            <button id="btnSave" class="btn-salvar" style="flex:1; margin:0;" onclick="saveSoftware('add')">Salvar no Banco</button>
            <button id="btnCancel" class="btn-admin-toggle" style="display:none; margin:0;" onclick="resetForm()">Cancelar Edição</button>
        </div>
    </div>

    <div class="header-controls">
        <input type="text" id="searchInput" style="flex:1; padding:12px; border-radius:6px; border:1px solid var(--cor-borda); font-size:16px;" placeholder="🔍 Buscar software ou laboratório (ex: E06)..." onkeyup="filterTable()">
        <div class="counter" id="resultCount" style="margin-left:15px; font-weight:bold; color:var(--ifrs-verde-escuro);">Carregando...</div>
    </div>

    <div id="loadingIndicator" class="loading">⏳ Sincronizando com a Planilha Google...</div>

    <div class="table-container">
        <table id="softwareTable" style="display:none;">
            <thead>
                <tr>
                    <th class="admin-col" style="display:none">Ações</th>
                    <th style="width: 70px;">ID</th>
                    <th>Software e Observações</th>
                    <th>Laboratórios</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // URL DE PRODUÇÃO
    const GOOGLE_APP_URL = "https://script.google.com/macros/s/AKfycbweYJf_YqJHVUgqvmsjJCKSS7YjX5GnwE44lHHJ70_ztnPrB90IRD2a-zxoYHE1fPfFuQ/exec"; 
    
    const LABS_PERMITIDOS = ["E10", "E09", "E08", "E07", "E06", "E05", "E04", "D04", "D05", "D06", "D10", "B2", "B2A"];
    
    let softwareData = [];
    let isAdminMode = false;
    let senhaConfirmada = ""; 
    let labsSelecionados = [];

    function toggleAdmin() {
        if (isAdminMode) {
            isAdminMode = false; senhaConfirmada = "";
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('btnToggleAdmin').innerHTML = '🔒 Acesso Restrito';
            renderTable();
        } else {
            document.getElementById('adminPasswordInput').value = "";
            document.getElementById('passwordModal').style.display = 'flex';
            document.getElementById('adminPasswordInput').focus();
        }
    }

    function closePasswordModal() { document.getElementById('passwordModal').style.display = 'none'; }

    async function confirmPassword() {
        const senha = document.getElementById('adminPasswordInput').value;
        if(!senha) return;
        
        const btn = document.querySelector('#passwordModal .btn-salvar');
        btn.innerText = "⏳ Validando...";
        
        try {
            const res = await fetch(`${GOOGLE_APP_URL}?action=verificarSenha&senha=${encodeURIComponent(senha)}`);
            const textoGoogle = await res.text();
            
            let dados;
            try {
                dados = JSON.parse(textoGoogle);
            } catch (err) {
                alert("❌ Erro de permissão. O Google bloqueou a validação.");
                btn.innerText = "Entrar"; return;
            }

            if (dados.erro) {
                alert("Erro: " + dados.erro);
            } else if (dados.sucesso) {
                isAdminMode = true; senhaConfirmada = senha;
                document.getElementById('adminPanel').style.display = 'flex';
                document.getElementById('btnToggleAdmin').innerHTML = '🔓 Sair do Admin';
                closePasswordModal();
                renderTable();
            } else { 
                alert("❌ Senha incorreta!"); 
            }
        } catch(e) { 
            alert("Erro de conexão ao validar senha."); 
        } finally {
            btn.innerText = "Entrar";
        }
    }

    async function loadData() {
        const ind = document.getElementById('loadingIndicator');
        try {
            const res = await fetch(GOOGLE_APP_URL);
            const textoGoogle = await res.text();
            
            try {
                softwareData = JSON.parse(textoGoogle);
            } catch (err) {
                ind.innerHTML = `<div class="error-box"><b>❌ ALERTA:</b> O Google bloqueou o acesso. Verifique as permissões de Implantação.</div>`;
                return;
            }
            
            if (softwareData.erro) {
                ind.innerHTML = `<div class="error-box"><b>❌ Erro na Planilha:</b><br>${softwareData.erro}</div>`;
                return;
            }

            if (!Array.isArray(softwareData)) {
                 ind.innerHTML = `<div class="error-box"><b>❌ Erro:</b> Dados inválidos recebidos.</div>`;
                 return;
            }

            ind.style.display = 'none';
            document.getElementById('softwareTable').style.display = 'table';
            renderTable();
        } catch (e) { 
            ind.innerHTML = `<div class="error-box"><b>❌ Falha de Conexão:</b> Não foi possível acessar a planilha.</div>`;
        }
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        if (!softwareData || softwareData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 20px;">Nenhum software encontrado na planilha.</td></tr>';
        } else {
            softwareData.sort((a,b) => (parseInt(a.id) || 0) - (parseInt(b.id) || 0)).forEach(sw => {
                const row = document.createElement('tr');
                const arrayLabs = Array.isArray(sw.labs) ? sw.labs : ["A DEFINIR"];
                const labsHTML = arrayLabs.map(l => {
                    const labTrimmed = l.trim();
                    return `<span class="lab-badge">${labTrimmed || 'A DEFINIR'}</span>`;
                }).join('');
                
                row.innerHTML = `
                    <td class="admin-col" style="display:${isAdminMode ? 'table-cell' : 'none'}">
                        <button style="cursor:pointer; background:#ffc107; border:none; padding:5px 10px; border-radius:4px;" onclick="prepararEdicao('${sw.id}')">✏️</button>
                        <button style="cursor:pointer; background:#dc3545; color:white; border:none; padding:5px 10px; border-radius:4px;" onclick="apagarSoftware('${sw.id}')">🗑️</button>
                    </td>
                    <td><strong>${sw.id || '-'}</strong></td>
                    <td>${sw.name || 'Sem Nome'}</td>
                    <td>${labsHTML}</td>
                `;
                tbody.appendChild(row);
            });
        }
        filterTable();
    }

    function filterTable() {
        const busca = document.getElementById('searchInput').value.toUpperCase();
        const linhas = document.querySelectorAll('#tableBody tr');
        let cont = 0;
        linhas.forEach(r => {
            const txt = r.textContent.toUpperCase();
            const show = txt.indexOf(busca) > -1;
            r.style.display = show ? '' : 'none';
            if(show && r.cells.length > 1) cont++; 
        });
        document.getElementById('resultCount').innerText = `${cont} Software(s)`;
    }

    function criarBotoesLaboratorio() {
        const container = document.getElementById('labSelectors');
        container.innerHTML = ''; 
        LABS_PERMITIDOS.forEach(lab => {
            const btn = document.createElement('div');
            btn.className = 'lab-badge';
            btn.style.cursor = 'pointer';
            btn.innerText = lab;
            btn.onclick = () => {
                if(labsSelecionados.includes(lab)) {
                    labsSelecionados = labsSelecionados.filter(l => l !== lab);
                    btn.style.background = '#d4edda'; btn.style.color = '#155724';
                } else {
                    labsSelecionados.push(lab);
                    btn.style.background = '#32a041'; btn.style.color = '#fff';
                }
            };
            container.appendChild(btn);
        });
    }

    async function saveSoftware(action) {
        const id = document.getElementById('newId').value;
        const name = document.getElementById('newName').value;
        const labs = labsSelecionados.join(",") || "A DEFINIR";
        if(!id || !name) return alert("Preencha ID e Nome!");

        try {
            await fetch(GOOGLE_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action, id, name, labs, senha: senhaConfirmada })
            });
            alert("Operação concluída com sucesso!"); 
            location.reload();
        } catch(e) { alert("Erro de comunicação ao salvar."); }
    }

    async function apagarSoftware(id) {
        if(!confirm(`Deseja realmente apagar o software ID ${id}?`)) return;
        try {
            await fetch(GOOGLE_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action:'delete', id, senha: senhaConfirmada })
            });
            location.reload();
        } catch(e) { alert("Erro ao apagar o registro."); }
    }

    function prepararEdicao(id) {
        const sw = softwareData.find(s => s.id == id);
        if(!sw) return;
        document.getElementById('newId').value = sw.id;
        document.getElementById('newId').readOnly = true;
        document.getElementById('newName').value = sw.name;
        document.getElementById('btnSave').onclick = () => saveSoftware('update');
        document.getElementById('btnCancel').style.display = 'block';
        window.scrollTo(0,0);
    }

    function resetForm() { location.reload(); }

    window.onload = () => { loadData(); criarBotoesLaboratorio(); };
</script>

</body>
</html>
